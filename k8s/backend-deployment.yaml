apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: surajmane121045/task-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_URI
          value: mongodb://admin:admin123@mongodb-service:27017/mydatabase?authSource=admin